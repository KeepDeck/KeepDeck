# Builds and publishes a release from an exact ref, without ever touching
# version accounting: version-bump.yml chains into this workflow after a
# release-class bump, and a manual dispatch with defaults rebuilds and
# republishes current main as-is. publish=false is a dry run that stops after
# producing the build artifacts. Idempotent — re-running, or dispatching again
# with the same ref, is always safe; what users actually receive is defined
# solely by the assets on the rolling "latest" release.
name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build and release"
        type: string
        required: false
        default: main
      publish:
        description: "Upload the assets to the rolling latest release"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

concurrency:
  group: release
  queue: max

jobs:
  test:
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.ref }}

  build:
    needs: test
    uses: ./.github/workflows/build-macos.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit

  publish:
    needs: build
    if: inputs.publish
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Read the version under release
        id: version
        run: |
          version="$(sed -nE 's/^version *= *"([^"]+)".*/\1/p' src-tauri/Cargo.toml | head -n1)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: KeepDeck-macos-*
          path: assets
          merge-multiple: true

      - name: Build the updater manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node scripts/release-manifest.mjs \
            --version "$VERSION" \
            --repo "${{ github.repository }}" \
            --out assets/latest.json \
            --payload darwin-aarch64=assets/KeepDeck-macos-arm64.app.tar.gz \
            --payload darwin-x86_64=assets/KeepDeck-macos-x64.app.tar.gz

      - name: Publish the rolling "latest" release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          notes="KeepDeck $VERSION (latest build).

          Install:
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh"
          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest --title "KeepDeck $VERSION" --notes "$notes" --latest
          fi
          # Payloads and zips first; the manifest goes LAST so a client that
          # polls mid-publish never sees it point at assets still being
          # replaced (worst case: a clean signature mismatch, retried on the
          # next check).
          gh release upload latest \
            assets/KeepDeck-macos-arm64.zip \
            assets/KeepDeck-macos-x64.zip \
            assets/KeepDeck-macos-arm64.app.tar.gz \
            assets/KeepDeck-macos-arm64.app.tar.gz.sig \
            assets/KeepDeck-macos-x64.app.tar.gz \
            assets/KeepDeck-macos-x64.app.tar.gz.sig \
            --clobber
          gh release upload latest assets/latest.json --clobber
          gh release edit latest --title "KeepDeck $VERSION" --notes "$notes"
