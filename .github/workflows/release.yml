# Builds and publishes a release from an exact ref, without ever touching
# version accounting: version-bump.yml chains into this workflow after a
# release-class bump, and a manual dispatch with defaults rebuilds and
# republishes current main as-is. publish=false is a dry run that stops after
# producing the build artifacts. Idempotent — re-running, or dispatching again
# with the same ref, is always safe; what users actually receive is defined
# solely by the assets on the rolling "latest" release.
name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build and release"
        type: string
        required: false
        default: main
      publish:
        description: "Upload the assets to the rolling latest release"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

concurrency:
  group: release
  queue: max

jobs:
  # Resolve the requested ref to one exact commit up front: a manual run asks
  # for a branch name ("main"), and without pinning each job would re-resolve
  # it at its own start time — a push landing mid-run would hand the tests and
  # the builds different code.
  pin:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pin.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Pin the requested ref to an exact commit
        id: pin
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  test:
    needs: pin
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ needs.pin.outputs.sha }}

  build:
    needs: [pin, test]
    uses: ./.github/workflows/build-macos.yml
    with:
      ref: ${{ needs.pin.outputs.sha }}
    secrets: inherit

  publish:
    needs: [pin, build]
    if: inputs.publish
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.pin.outputs.sha }}
          # The release notes walk merge history back to the previous release.
          fetch-depth: 0

      - name: Read the version under release
        id: version
        run: |
          version="$(sed -nE 's/^version *= *"([^"]+)".*/\1/p' src-tauri/Cargo.toml | head -n1)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compose the release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        # The previously RELEASED version comes from the live manifest before
        # this run overwrites it; a missing manifest (first release) degrades
        # to notes without a changelog.
        run: |
          previous="$(curl -fsSL "https://github.com/${{ github.repository }}/releases/download/latest/latest.json" | jq -r .version || true)"
          node scripts/release-notes.mjs \
            --version "$VERSION" \
            --previous "$previous" \
            --repo "${{ github.repository }}" \
            --out notes.md
          node scripts/release-notes.mjs \
            --version "$VERSION" \
            --rolling \
            --repo "${{ github.repository }}" \
            --out rolling-notes.md

      - uses: actions/download-artifact@v8
        with:
          pattern: KeepDeck-macos-*
          path: assets
          merge-multiple: true

      - name: Build the updater manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node scripts/release-manifest.mjs \
            --version "$VERSION" \
            --repo "${{ github.repository }}" \
            --out assets/latest.json \
            --payload darwin-aarch64=assets/KeepDeck-macos-arm64.app.tar.gz \
            --payload darwin-x86_64=assets/KeepDeck-macos-x64.app.tar.gz

      - name: Publish the rolling "latest" release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          release_state="$(node scripts/github-release-state.mjs --repo "$GH_REPO" --tag latest)"
          case "$release_state" in
            exists) ;;
            missing)
              gh release create latest --title "KeepDeck latest" --notes-file rolling-notes.md --latest=false
              ;;
            *)
              echo "Unexpected release state: $release_state" >&2
              exit 1
              ;;
          esac
          # Payloads and zips first; the manifest goes LAST so a client that
          # polls mid-publish never sees it point at assets still being
          # replaced (worst case: a clean signature mismatch, retried on the
          # next check).
          gh release upload latest \
            assets/KeepDeck-macos-arm64.zip \
            assets/KeepDeck-macos-x64.zip \
            assets/KeepDeck-macos-arm64.app.tar.gz \
            assets/KeepDeck-macos-arm64.app.tar.gz.sig \
            assets/KeepDeck-macos-x64.app.tar.gz \
            assets/KeepDeck-macos-x64.app.tar.gz.sig \
            --clobber
          gh release upload latest assets/latest.json --clobber
          # Idempotent touch-up: the content is static, but the edit heals
          # manual changes and strips the badge if it ever landed here.
          gh release edit latest --title "KeepDeck latest" --notes-file rolling-notes.md --latest=false
          # Keep the fixed tag honest about what the rolling assets were
          # built from — without this it points at whatever commit the
          # release was first created on, forever.
          git push --force origin "${{ needs.pin.outputs.sha }}:refs/tags/latest"

      - name: Archive this version as its own release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        # The rolling "latest" is what installs and updates consume; the
        # versioned release is the permanent history entry — same assets and
        # notes, but no updater manifest (exactly one latest.json may exist)
        # and never the "Latest" badge, which stays on the rolling release.
        # Idempotent: a republish updates the same archive entry.
        run: |
          release_state="$(node scripts/github-release-state.mjs --repo "$GH_REPO" --tag "$VERSION")"
          case "$release_state" in
            exists) ;;
            missing)
              gh release create "$VERSION" \
                --target "${{ needs.pin.outputs.sha }}" \
                --title "KeepDeck $VERSION" --notes-file notes.md --latest
              ;;
            *)
              echo "Unexpected release state: $release_state" >&2
              exit 1
              ;;
          esac
          gh release upload "$VERSION" \
            assets/KeepDeck-macos-arm64.zip \
            assets/KeepDeck-macos-x64.zip \
            assets/KeepDeck-macos-arm64.app.tar.gz \
            assets/KeepDeck-macos-arm64.app.tar.gz.sig \
            assets/KeepDeck-macos-x64.app.tar.gz \
            assets/KeepDeck-macos-x64.app.tar.gz.sig \
            --clobber

      - name: Build and upload the accumulated changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        # changelog.json is derived from the published versioned releases. The
        # archive step above runs first so the list can carry this version too,
        # but GitHub's releases-list endpoint is eventually consistent and omits
        # a release for seconds after it is created — so the just-published
        # version is ALSO injected as an authoritative head entry (--version +
        # --notes notes.md), guaranteeing it is present regardless of that lag.
        # Without the head, every publish's changelog.json dropped the very
        # version it was publishing, and the updater showed no notes for the
        # update on offer. The list still supplies every older entry (deduped).
        # GH_TOKEN/GH_REPO come from the job-level env. Uploads to the rolling
        # "latest" release, where the app fetches it alongside latest.json.
        run: |
          node scripts/release-changelog.mjs \
            --repo "${{ github.repository }}" \
            --version "$VERSION" \
            --notes notes.md \
            --out assets/changelog.json
          gh release upload latest assets/changelog.json --clobber
