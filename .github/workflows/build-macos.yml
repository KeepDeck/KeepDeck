# Reusable macOS build: produces the per-arch app bundle zip plus the signed
# updater payload for an exact ref, natively on each architecture (no fragile
# cross-compile). Called by release.yml; artifacts land in the caller's run.
name: Build macOS

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build"
        type: string
        required: true
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        description: "Minisign private key that signs the updater payloads"
        required: true
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        description: "Password for the minisign private key"
        required: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest # Apple Silicon
            arch: arm64
          - runner: macos-15-intel # Intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          # Node 24 (matches local dev): scripts/build-plugins.mjs imports the
          # workspace's TypeScript entry (@keepdeck/plugin-api → src/index.ts).
          # Node < 22.18 can't load .ts and fails with ERR_UNKNOWN_FILE_EXTENSION.
          node-version: 24
          cache: pnpm

      # Cache compiled Rust deps so repeat builds only recompile our own crates.
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package the app (native to this runner's arch)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          source scripts/macos-app.sh
          build_keepdeck_app --config src-tauri/tauri.release.conf.json
          app="$(locate_keepdeck_app)"
          ditto -c -k --sequesterRsrc --keepParent "$app" "KeepDeck-macos-${{ matrix.arch }}.zip"
          # Both legs emit the same default payload name; per-arch names keep
          # them apart on the release. minisign verifies raw bytes, so the
          # rename cannot invalidate the signature.
          payload="$(locate_keepdeck_updater_payload)"
          mv "$payload" "KeepDeck-macos-${{ matrix.arch }}.app.tar.gz"
          mv "$payload.sig" "KeepDeck-macos-${{ matrix.arch }}.app.tar.gz.sig"

      - uses: actions/upload-artifact@v7
        with:
          name: KeepDeck-macos-${{ matrix.arch }}
          path: |
            KeepDeck-macos-${{ matrix.arch }}.zip
            KeepDeck-macos-${{ matrix.arch }}.app.tar.gz
            KeepDeck-macos-${{ matrix.arch }}.app.tar.gz.sig
          if-no-files-found: error
          overwrite: true
