# Bumps the app version on main after every merge, so feature branches never
# touch version files and parallel agents cannot collide on a bump.
#
# Every merge landed since the last version change bumps patch; a merge whose
# subject contains "(minor)" bumps minor (scripts/version-bump.mjs). A newer
# push to main cancels an in-flight run: the fresh run recounts from the last
# version change and covers every merge since, so cancellation loses nothing —
# and the same recount heals a run whose final push lost a race.
#
# The bump commit is pushed with GITHUB_TOKEN, and GITHUB_TOKEN pushes never
# trigger workflows, so this cannot recurse. workflow_dispatch is the manual
# escape hatch: it applies exactly one bump of the chosen kind.
name: Version bump

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor]

permissions:
  contents: write

concurrency:
  group: version-bump
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      minor: ${{ steps.bump.outputs.minor }}
    # Belt and braces for pushes made with credentials other than GITHUB_TOKEN.
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'Bump version to ')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute and apply the bump
        id: bump
        run: node scripts/version-bump.mjs ${{ github.event_name == 'workflow_dispatch' && format('--bump {0}', inputs.bump) || '' }}

      - name: Commit and push
        if: steps.bump.outputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Bump version to ${{ steps.bump.outputs.version }}"
          git push origin main

  # Build the newly bumped version for each macOS arch, natively and in
  # parallel (arm64 on Apple Silicon, x86_64 on an Intel runner — no fragile
  # cross-compile), and hand the zips to the publish job. Runs ONLY for minor
  # (or larger) bumps; patch merges skip the expensive macOS build. Hangs off
  # the same run via `needs` because the bot's GITHUB_TOKEN bump push cannot
  # trigger a fresh workflow.
  build:
    needs: bump
    if: needs.bump.outputs.minor == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest # Apple Silicon (arm64)
            asset: KeepDeck-macos-arm64.zip
          - runner: macos-13 # Intel (x86_64)
            asset: KeepDeck-macos-x64.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # includes the bump commit pushed by the bump job

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          # Node 24 (matches local dev): the frontend build runs
          # `node scripts/build-plugins.mjs`, which imports the workspace's
          # TypeScript entry (@keepdeck/plugin-api → src/index.ts). Node < 22.18
          # can't load .ts and fails with ERR_UNKNOWN_FILE_EXTENSION.
          node-version: 24
          cache: pnpm

      # Cache compiled Rust deps so repeat builds only recompile our own crates.
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package the app (native to this runner's arch)
        run: |
          source scripts/macos-app.sh
          build_keepdeck_app
          app="$(locate_keepdeck_app)"
          ditto -c -k --sequesterRsrc --keepParent "$app" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  # Attach both arch zips to the rolling "latest" GitHub Release (one fixed tag,
  # force-updated each release; the installer always pulls it).
  publish:
    needs: [bump, build]
    if: needs.bump.outputs.minor == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      VERSION: ${{ needs.bump.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Publish the rolling "latest" release
        run: |
          notes="KeepDeck $VERSION (latest build).

          Install:
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh"
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest assets/*.zip --clobber
            gh release edit latest --title "KeepDeck $VERSION" --notes "$notes"
          else
            gh release create latest assets/*.zip \
              --title "KeepDeck $VERSION" --notes "$notes" --latest
          fi
