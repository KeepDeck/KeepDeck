# Bumps the app version on main after every merge, so feature branches never
# touch version files and parallel agents cannot collide on a bump.
#
# Every merge landed since the last version change bumps patch; a merge whose
# subject contains "(minor)" bumps minor (scripts/version-bump.mjs). A newer
# push to main cancels an in-flight run: the fresh run recounts from the last
# version change and covers every merge since, so cancellation loses nothing —
# and the same recount heals a run whose final push lost a race.
#
# The bump commit is pushed with GITHUB_TOKEN, and GITHUB_TOKEN pushes never
# trigger workflows, so this cannot recurse. workflow_dispatch is the manual
# escape hatch: it applies exactly one bump of the chosen kind.
name: Version bump

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor]

permissions:
  contents: write

concurrency:
  group: version-bump
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    # Belt and braces for pushes made with credentials other than GITHUB_TOKEN.
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'Bump version to ')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute and apply the bump
        id: bump
        run: node scripts/version-bump.mjs ${{ github.event_name == 'workflow_dispatch' && format('--bump {0}', inputs.bump) || '' }}

      - name: Commit and push
        if: steps.bump.outputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Bump version to ${{ steps.bump.outputs.version }}"
          git push origin main

  # Build the newly bumped version and publish it as the rolling "latest"
  # GitHub Release (one fixed tag, force-updated each version; the installer
  # always pulls it). This hangs off the same run via `needs`: the bot's
  # GITHUB_TOKEN bump push cannot trigger a fresh workflow, so a standalone
  # push-triggered release job would never fire.
  release:
    needs: bump
    if: needs.bump.outputs.version != ''
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # includes the bump commit pushed by the job above

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          # Node 24 (matches local dev): the frontend build runs
          # `node scripts/build-plugins.mjs`, which imports the workspace's
          # TypeScript entry (@keepdeck/plugin-api → src/index.ts). Node < 22.18
          # can't load .ts and fails with ERR_UNKNOWN_FILE_EXTENSION.
          node-version: 24
          cache: pnpm

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package the universal app
        run: |
          source scripts/macos-app.sh
          build_keepdeck_app --target universal-apple-darwin
          app="$(locate_keepdeck_app)"
          ditto -c -k --sequesterRsrc --keepParent "$app" KeepDeck-macos-universal.zip

      - name: Publish the rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.bump.outputs.version }}
        run: |
          notes="KeepDeck $VERSION (latest build).

          Install:
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh"
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest KeepDeck-macos-universal.zip --clobber
            gh release edit latest --title "KeepDeck $VERSION" --notes "$notes"
          else
            gh release create latest KeepDeck-macos-universal.zip \
              --title "KeepDeck $VERSION" --notes "$notes" --latest
          fi
