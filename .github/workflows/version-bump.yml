# Bumps the app version on main after every merge, so feature branches never
# touch version files and parallel agents cannot collide on a bump.
#
# Every merge landed since the last version change bumps patch; "(minor)" and
# "(major)" merge subjects raise the corresponding boundary. The bump commit
# is pushed immediately, and a release-class bump (minor, major, or any manual
# dispatch) then chains into release.yml for the exact bump commit. What users
# actually receive is defined by the rolling "latest" release, so a failed
# release leaves them untouched — re-dispatch release.yml to heal it.
#
# Runs queue instead of replacing one another so a manual bump request is not
# discarded by a later push. The bump commit is pushed with GITHUB_TOKEN, and
# GITHUB_TOKEN pushes never trigger workflows, so this cannot recurse — but
# workflow_dispatch events created with GITHUB_TOKEN DO start runs (documented
# exception), which is what lets the release chain work.
name: Version bump

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write
  actions: write

concurrency:
  group: version-bump
  queue: max

jobs:
  bump:
    runs-on: ubuntu-latest
    # Belt and braces for pushes made with credentials other than GITHUB_TOKEN.
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'Bump version to ')
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Compute and apply the bump
        id: bump
        run: node scripts/version-bump.mjs ${{ github.event_name == 'workflow_dispatch' && format('--bump {0}', inputs.bump) || '' }}

      - name: Commit and push the bump
        id: push
        if: steps.bump.outputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Bump version to ${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Start the release for this bump
        if: steps.bump.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh workflow run release.yml -f ref=${{ steps.push.outputs.sha }}
