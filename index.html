<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeepDeck</title>
    <style>
      /* Paint the document dark on the very first frame — before the JS bundle
         (which carries App.css) parses — so the webview never flashes white on
         boot. #boot is a plain dark pre-React splash (no branding yet — logo
         TBD), dismissed by main.tsx once the app has painted. It shares the
         app's dark background, so the hand-off shows no white frame. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0e14;
      }
      #root {
        height: 100%;
      }
      #boot {
        position: fixed;
        inset: 0;
        z-index: 10;
        background: #0b0e14;
        transition: opacity 0.25s ease;
      }
      #boot.boot--hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="boot"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
