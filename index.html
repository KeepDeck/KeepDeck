<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeepDeck</title>
    <style>
      /* Paint the document dark on the very first frame — before the JS bundle
         (which carries App.css) parses — so the webview never flashes white on
         boot. #boot is a lightweight pre-React loading screen, dismissed by
         main.tsx once the app has painted. Both share the same dark background,
         so the hand-off shows no white frame at any point. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0e14;
      }
      #root {
        height: 100%;
      }
      #boot {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0e14;
        color: #6b7280;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: 0.06em;
        transition: opacity 0.25s ease;
      }
      #boot.boot--hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="boot">KeepDeck</div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
